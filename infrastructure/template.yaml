AWSTemplateFormatVersion: '2010-09-09' # CloudFormation language version (standard value)
Transform: AWS::Serverless-2016-10-31  # Important: Tells AWS this is SAM, not standard CloudFormation
Description: Task Management API 

# --- PARAMETER TO TAKE VALUE OF SAMCONFIG.TOML ---
Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, uat]
    Description: Environment stage (dev or uat)

Globals:
  Function:
    Runtime: nodejs20.x
    CodeUri: ../ # Root located (package.json &&src)
    Timeout: 10
    Environment:  # Accessible in code via: const TABLE_NAME = process.env.TABLE_NAME
      Variables:
        TABLE_NAME: !Ref TasksTable  # All Lambdas can see this variable
        NODE_ENV: !Ref Env 
    # --- LOGGING STRATEGY (Native JSON) ---
    LoggingConfig:
      LogFormat: JSON         # Automatically converts Lambda system logs into JSON
      ApplicationLogLevel: INFO 
      SystemLogLevel: WARN    # Only logs critical system errors to reduce noise/costs
    # --- SCALING BEHAVIOR ---
    # ReservedConcurrentExecutions: 2 # Limits to 10 simultaneous requests to protect the database and budget

Resources:
  ##########################################################################
  # 1. CONFIG COGNITO (TO MANAGENMENT USER)
  ##########################################################################
  MyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "MyTaskAppUsers-${Env}"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]

  MyUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "MyTaskAppClient-${Env}"
      UserPoolId: !Ref MyUserPool
      ExplicitAuthFlows: [ADMIN_NO_SRP_AUTH, USER_PASSWORD_AUTH]

  ##########################################################################
  # 2. DEFINE API HAVE AUTHORIZER
  ##########################################################################
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Env
      Auth:
        DefaultAuthorizer: MyCognitoAuth
        Authorizers:
          MyCognitoAuth:
            UserPoolArn: !GetAtt MyUserPool.Arn

  # DynamoDB Table for storing tasks
  TasksTable:
    Type: AWS::DynamoDB::Table  # Declares a NoSQL database table
    Properties:
      TableName: !Sub "MySimpleTasks-${Env}"
      AttributeDefinitions:     # Declares columns used as keys
        - AttributeName: id
          AttributeType: S
      KeySchema:                # Defines 'id' as the HASH (Partition Key) used for data lookups
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST  # On-demand scaling (pay only for what you use)
  ##########################################################################
  # 4. MONITORING DASHBOARD (Yêu cầu chính của Tuần 2)
  ##########################################################################
  MainMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "Task-Manager-Monitor-${Env}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "# 🚀 Monitoring Dashboard (${Env})"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 1, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${CreateTaskFunction}", { "label": "Create" } ],
                  [ "...", "${GetAllTasksFunction}", { "label": "GetAll" } ],
                  [ "...", "${GetTaskByIdFunction}", { "label": "GetById" } ],
                  [ "...", "${DeleteTaskFunction}", { "label": "Delete" } ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "1. Invocations"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 1, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${CreateTaskFunction}", { "label": "Create" } ],
                  [ "...", "${GetAllTasksFunction}", { "label": "GetAll" } ],
                  [ "...", "${GetTaskByIdFunction}", { "label": "GetById" } ],
                  [ "...", "${DeleteTaskFunction}", { "label": "Delete" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "2. Duration (ms)"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 7, "width": 24, "height": 6,
              "properties": {
                "metrics": [
                  [ { "expression": "m1/n1*100", "label": "Error Rate %", "id": "e1", "color": "#d62728" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "${CreateTaskFunction}", { "id": "m1", "visible": false } ],
                  [ ".", "Invocations", ".", ".", { "id": "n1", "visible": false } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "3. Error Rate % - example cho CreateTask"
              }
            }
          ]
        }
  ##########################################################################
  # 5. LAMBDA FUNCTIONS & LOG GROUPS
  ##########################################################################
  # POST /tasks
  CreateTaskLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CreateTaskFunction}"
      RetentionInDays: 7
  CreateTaskFunction:
    Type: AWS::Serverless::Function # A Lambda entity supported by SAM
    Properties:
      Handler: src/handlers/createTask.handler   # Execution entry point: find create.js and call the handler function
      Policies: #Translate from group to granular actions
        - Statement:
            - Effect: Allow
              Action:
                - "dynamodb:PutItem"
              Resource: !GetAtt TasksTable.Arn #Request arn(amazon resource name)- string id about region $ account, example: arn:aws:dynamodb:ap-southeast-1:123456789:table/MySimpleTasks
      Events:
        CreateApi:
          Type: Api  # Creates an HTTP API endpoint to route requests to this Lambda
          Properties:
            RestApiId: !Ref MyApi #Connect with API have Auth
            Path: /tasks
            Method: post

  # GET /tasks
  GetAllTasksLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetAllTasksFunction}"
      RetentionInDays: 7
  GetAllTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAllTasks.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "dynamodb:Scan"
              Resource: !GetAtt TasksTable.Arn
      Events:  # Where SAM automatically creates the API Gateway
        GetAllApi:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi #Connect with API have Auth
            Path: /tasks
            Method: get

  # GET /tasks/{id}
  GetTaskByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetTaskByIdFunction}"
      RetentionInDays: 7
  GetTaskByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getTaskById.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "dynamodb:GetItem"
              Resource: !GetAtt TasksTable.Arn
      Events:
        GetByIdApi:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi #Connect with API have Auth
            Path: /tasks/{id}
            Method: get

  # DELETE /tasks/{id}
  DeleteTaskLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DeleteTaskFunction}"
      RetentionInDays: 7
  DeleteTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/deleteTask.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "dynamodb:GetItem"
                - "dynamodb:DeleteItem"
              Resource: !GetAtt TasksTable.Arn
      Events:
        DeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi #Connect with API have Auth
            Path: /tasks/{id}
            Method: delete
  ##########################################################################
  # 6. ALARM & NOTIFICATION 
  ##########################################################################
  
  # Step A: SNS Topic to notif message
  MyMonitoringTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "Alert-Topic-${Env}"
      TopicName: !Sub "task-manager-alerts-${Env}"

  #step B: Error Alarm
  #Sum error of lambda >0 while 5 minute
  TotalErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Noti if have any error lambda"
      Namespace: AWS/Lambda
      MetricName: Errors
      #Not choose Dimension FunctionName for it scan ALL lambda function in Stack 
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref MyMonitoringTopic
      TreatMissingData: notBreaching

  # Bước C: Duration Alarm
  # Noti if have lambda function run >5s
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Noti if system response > 5s"
      Namespace: AWS/Lambda
      MetricName: Duration
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5000 # 5000ms = 5s
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref MyMonitoringTopic
Outputs:
  ApiUrl:
    Description: "Base URL for the API Gateway"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}/tasks"
  UserPoolId:
    Value: !Ref MyUserPool
  UserPoolClientId:
    Value: !Ref MyUserPoolClient
  Environment:
    Value: !Ref Env
  DashboardUrl:
    Description: "Link to your Monitoring Dashboard"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=Task-Manager-Monitor-${Env}"
